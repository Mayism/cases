case:
  id: requirement_001
  scenario: requirement
  title: 课程助手元服务，课程签到页增加获取位置信息功能
  prompt: 点击去签到banner，在module_secure_checkin模块中实现获取位置信息权限功能，进入课程签到页面，需要提示位置信息授权。在课程签到页面，点击确认按钮，需要对获取位置信息权限做校验
constraints:
- id: HM-SCHOOL-001-02
  name:课程助手元服务，课程签到页增加获取位置信息功能
  priority: P0
  rules:
  - target: '**/pages/*.ets'
    llm: 课程签到页增加获取位置信息功能，使用Location kit的实现获取位置信息权限授权功能，可以获取精确位置，正常授权。如果不授权进入课程签到页面，点击确认按钮，需要再次拉起位置信息授权半模态弹窗，只有位置信息授权成功之后，才能签到。
  description: 课程签到页增加获取位置信息功能，使用Location kit的实现获取位置信息权限授权功能，可以获取精确位置，正常授权。如果不授权进入课程签到页面，点击确认按钮，需要再次拉起位置信息授权半模态弹窗，只有位置信息授权成功之后，才能签到。
